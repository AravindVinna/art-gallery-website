<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivineCanvas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
}

header{
background:#3b424a;
color:white;
padding:15px 30px;
}

#home{
margin-top:80px;
height:100vh;
background-image:url("./images/home.jpeg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding-left:80px;
}

.home-text h1{
font-size:60px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.product{
background:#fff;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
width:200px;
height:250px;
object-fit:cover;
border-radius:10px;
}

.price{
color:green;
font-weight:bold;
}

footer{
background:#2b2f33;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>

</head>

<body>

<header class="d-flex justify-content-between">

<h3>🎨AravindArts</h3>

<div>
🛒 <span style="cursor:pointer" onclick="openCart()">Cart (<span id="cart-count">0</span>)</span>
<button onclick="logout()" class="btn btn-sm btn-light ms-3">Logout</button>
</div>

</header>


<section id="home">

<div class="home-text">

<h1>Art Speaks</h1>
<h1>Where Words</h1>
<h1>Are Unable</h1>

</div>

</section>


<section class="container mt-5">

<div class="product-grid">

<div class="product">
<img src="./images/product1 (1).jpg">
<h4>Lord Krishna</h4>
<p class="price">₹999</p>
<button class="btn btn-primary" onclick="addToCart('Lord Krishna',999)">Add to Cart</button>
</div>

<div class="product">
<img src="./images/product1 (2).jpg">
<h4>Lord Hanuman</h4>
<p class="price">₹899</p>
<button class="btn btn-primary" onclick="addToCart('Lord Hanuman',899)">Add to Cart</button>
</div>

<div class="product">
<img src="./images/product1 (3).jpg">
<h4>Lord Shiva</h4>
<p class="price">₹1099</p>
<button class="btn btn-primary" onclick="addToCart('Lord Shiva',1099)">Add to Cart</button>
</div>

</div>

</section>
<section class="container mt-4">

<div class="product-grid">

<div class="product">
<img src="./images/product4.jpg">
<h4>Acteo Prabhas/h4>
<p class="price">₹999</p>
<button class="btn btn-primary" onclick="addToCart('Lord Krishna',999)">Add to Cart</button>
</div>

<div class="product">
<img src="./images/product 5.jpg">
<h4>Pawan kalyan</h4>
<p class="price">₹899</p>
<button class="btn btn-primary" onclick="addToCart('Lord Hanuman',899)">Add to Cart</button>
</div>

<div class="product">
<img src="./images/product 6.jpg">
<h4>santa claus</h4>
<p class="price">₹1099</p>
<button class="btn btn-primary" onclick="addToCart('Lord Shiva',1099)">Add to Cart</button>
</div>

</div>

</section>


<footer>

Creating with passion. Growing with purpose.

</footer>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){

cart.push({name,price});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart");

}

function logout(){

window.location.href="index.html";

}

</script>

</body>
</html>
