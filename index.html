<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DivineCanvas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background: linear-gradient(to right, #3b424a, #2b2f33);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:15px;
width:350px;
}
</style>
</head>

<body>

<div class="login-box shadow">

<h3 class="text-center mb-4">User Login</h3>

<form id="loginForm">
<input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
<button class="btn btn-dark w-100">Login</button>
</form>

<p class="mt-3 text-center">
Don't have account?
<a href="register.html">Register</a>
</p>

<p id="msg" class="text-danger text-center mt-2"></p>

</div>

<script>

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const res = await fetch("https://art-gallery-website-1.onrender.com/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.success){

alert("Login successful");

window.location.href="home.html";

}else{

document.getElementById("msg").innerText=data.message;

}

});

</script>

</body>
</html>
