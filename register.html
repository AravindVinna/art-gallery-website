<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#2b2f33;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-box{
background:white;
padding:40px;
border-radius:15px;
width:350px;
}
</style>
</head>

<body>

<div class="register-box">

<h3 class="text-center mb-4">Register</h3>

<form id="registerForm">

<input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-dark w-100">Register</button>

</form>

<p class="mt-3 text-center">
Already have account? 
<a href="index.html">Login</a>
</p>

<p id="msg" class="text-danger text-center mt-2"></p>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const res = await fetch("https://art-gallery-website-1.onrender.com/register",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({email,password})
})
const data = await res.json();

if(data.success){

alert("Registered Successfully");

window.location.href="index.html";

}else{

document.getElementById("msg").innerText=data.message;

}

});

</script>

</body>
</html>
